services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - engram-network

  engram:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://engram:engram@postgres:5432/engram
    networks:
      - engram-network

  # engram-embed:
  #   image: ghcr.io/heybeaux/engram-embed:latest  # Rust embedding service (optional)
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - engram-network
  #   # If not using engram-embed, set EMBEDDING_PROVIDER=openai and provide OPENAI_API_KEY in .env

volumes:
  pgdata:

networks:
  engram-network:
