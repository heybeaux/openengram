name: CI (Cloud Edition)

on:
  push:
    branches: [main]

concurrency:
  group: ci-cloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: engram_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/engram_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/engram_test
      EDITION: cloud
      ENCRYPTION_KEY: ci-test-encryption-key-32chars!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test -- --no-coverage --forceExit --ci

  # migrate-prod: DISABLED — migrations now run as part of Railway deploy process
  # See: https://docs.railway.com/guides/deploying#build-command
  # To run migrations manually: railway run npx prisma migrate deploy
  # migrate-prod:
  #   name: Migrate Production DB
  #   needs: ci
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #   runs-on: ubuntu-latest
  #   timeout-minutes: 5
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: pnpm/action-setup@v4
  #       with: { version: 9 }
  #     - uses: actions/setup-node@v4
  #       with: { node-version: 20, cache: pnpm }
  #     - run: pnpm install --frozen-lockfile
  #     - name: Generate Prisma client
  #       run: npx prisma generate
  #     - name: Deploy migrations to production
  #       run: npx prisma migrate deploy
  #       env:
  #         DATABASE_URL: ${{ secrets.DATABASE_URL }}
  #         DIRECT_URL: ${{ secrets.DIRECT_URL }}
  #       continue-on-error: true

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [ci]
    if: failure()
    steps:
      - name: Send Discord notification
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          WORKFLOW="${{ github.workflow }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD=$(jq -n \
            --arg content "🔴 **CI Failed** | **${REPO}** | Branch: \`${BRANCH}\` | Commit: \`${SHORT_SHA}\`
          Workflow: ${WORKFLOW}
          Run: ${RUN_URL}" \
            '{content: $content}')

          curl -v -X POST \
            -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/v10/channels/1474067664207872156/messages"
