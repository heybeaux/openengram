name: CI (Local Edition)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-local-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: engram_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/engram_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/engram_test
      EDITION: local
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test -- --no-coverage --forceExit --ci --testPathIgnorePatterns='cloud-link|cloud-sync|instance/instance.controller.spec|ensemble|stripe|analytics|monitoring|feedback|eval|reembedding|webhook'

  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [ci]
    if: failure()
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CI_WEBHOOK }}
        run: |
          COMMIT_MSG=$(echo '${{ github.event.head_commit.message }}' | head -1 | sed 's/"/\\"/g')
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"🔴 **CI Failed** | **${{ github.repository }}** | Branch: \`${{ github.ref_name }}\` | Commit: \`${GITHUB_SHA::7}\`\nWorkflow: ${{ github.workflow }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\nCommit: ${COMMIT_MSG}\"}" \
            "$DISCORD_WEBHOOK"
