name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      # App-level lint/typecheck/test runs in app-specific workflows. Keep the
      # root workspace job service-free and package-focused.
      - run: pnpm turbo run lint --filter="./packages/*"
      - run: pnpm turbo run typecheck --filter="./packages/*"
      - run: pnpm turbo run test --filter="./packages/*"
