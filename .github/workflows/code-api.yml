name: code-api

on:
  pull_request:
    paths:
      - "apps/code-api/**"
      - ".github/workflows/code-api.yml"
  push:
    branches:
      - main
    paths:
      - "apps/code-api/**"
      - ".github/workflows/code-api.yml"

jobs:
  code-api:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/engram_code_test
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: engram_code_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/code-api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            apps/code-api/pnpm-lock.yaml
      - name: Install root workspace
        working-directory: .
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate
      - name: Run migrations
        run: pnpm exec prisma migrate deploy
      - name: Lint API
        working-directory: .
        run: pnpm turbo run lint --filter=engram-code
      - name: Typecheck API
        working-directory: .
        run: pnpm turbo run typecheck --filter=engram-code
      - name: Build API
        working-directory: .
        run: pnpm turbo run build --filter=engram-code
      - name: Test API
        working-directory: .
        run: pnpm turbo run test --filter=engram-code
      - name: Install nested code dashboard
        run: pnpm install --frozen-lockfile
      - name: Build nested dashboard
        run: pnpm --dir apps/dashboard build
      - name: Test nested dashboard
        run: pnpm --dir apps/dashboard test
