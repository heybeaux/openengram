name: Playwright Visual Audit

on:
  workflow_dispatch:

jobs:
  visual-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_ENGRAM_API_URL: http://localhost:3001
          NEXT_PUBLIC_ENGRAM_API_KEY: test_key
          NEXT_PUBLIC_ENGRAM_USER_ID: test_user
          JWT_SECRET: visual-audit-secret

      - name: Run visual audit
        run: pnpm test:e2e:visual
        env:
          CI: true
          JWT_SECRET: visual-audit-secret

      - name: Upload Playwright visual audit artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-visual-audit
          path: |
            playwright-report/
            test-results/
          retention-days: 14
