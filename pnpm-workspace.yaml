# App/service workspace membership is enabled incrementally.
packages:
  - "apps/dashboard"
  - "apps/api"
  - "apps/code-api"
  - "packages/*"
ignoreScripts: false
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@prisma/client"
  - "@prisma/engines"
  - "prisma"
  - "tree-sitter"
  - "tree-sitter-cli"
  - "tree-sitter-go"
  - "tree-sitter-javascript"
  - "tree-sitter-python"
  - "tree-sitter-rust"
  - "tree-sitter-swift"
  - "tree-sitter-typescript"
  - "tree-sitter-elixir"
  - "unrs-resolver"
  - "esbuild"
  - "sharp"
